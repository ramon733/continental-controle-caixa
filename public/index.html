<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
    <meta name="theme-color" content="#001628" />
    <meta name="description" content="Continental Performance - Controle de Caixa" />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo192.png" />
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
    <style>
      html,body,#root{margin:0;padding:0;width:100%;max-width:100vw}
      body{overflow-x:hidden}
      .cp-month-bar{overflow-x:scroll!important;overflow-y:hidden!important;flex-wrap:nowrap!important;-webkit-overflow-scrolling:touch!important;max-width:92vw!important;padding-bottom:4px!important}
      .cp-tabs{overflow-x:scroll!important;overflow-y:hidden!important;-webkit-overflow-scrolling:touch!important}
      .cp-month-bar::-webkit-scrollbar,.cp-tabs::-webkit-scrollbar{height:0;display:none}
      @media(max-width:768px){
        .cp-top-row{flex-direction:column!important;align-items:flex-start!important;gap:10px!important}
        .cp-header{padding:10px 12px!important}
        .cp-body{padding:16px 10px!important}
        .cp-kpi{flex:1 1 100%!important;min-width:0!important}
        .cp-kpis{width:100%}
        .cp-charts,.cp-cards-row{flex-direction:column!important;width:100%}
        .cp-chart-card,.cp-card{flex:1 1 100%!important;min-width:0!important}
        .cp-table-wrap{max-width:calc(100vw - 20px);overflow-x:auto!important}
        .cp-partner-grid{flex-direction:column!important}
        .cp-btn-row{flex-direction:column!important;width:100%}
        .cp-btn-row button{width:100%!important}
        .cp-search-bar{flex-direction:column!important}
        .cp-search-bar>*{width:100%!important;flex:none!important;min-width:0!important}
        .cp-tabs button span{display:none!important}
      }
    </style>
    <title>Continental Performance</title>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
  </body>
</html>
